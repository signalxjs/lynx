name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bug'
  - title: '🧰 Maintenance'
    labels:
      - 'chore'
      - 'dependencies'
      - 'refactor'
  - title: '📚 Documentation'
    labels:
      - 'docs'
  - title: '🧪 Tests'
    labels:
      - 'test'
      - 'tests'
  - title: '⚡ Performance'
    labels:
      - 'performance'
      - 'perf'

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '\<*_&'

# Surface the package scope from Conventional-Commit-style PR titles so the
# generated notes read e.g. "**lynx-cli:** support --android (#123) @user".
# Strips the leading `feat(scope):` / `fix(scope):` / `chore(scope)!:` prefix
# from $TITLE before substitution. Untitled-scope PRs render unchanged.
replacers:
  - search: '/^- (feat|fix|chore|docs|refactor|test|perf|build|ci|style)\(([^)]+)\)!?:\s*/gim'
    replace: '- **$2:** '
  - search: '/^- (feat|fix|chore|docs|refactor|test|perf|build|ci|style)!?:\s*/gim'
    replace: '- '

version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
  minor:
    labels:
      - 'minor'
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'patch'
      - 'fix'
      - 'bug'
      - 'chore'
      - 'dependencies'
      - 'docs'
  default: patch

autolabeler:
  - label: 'fix'
    title:
      - '/^fix(\(.+\))?:/i'
  - label: 'feature'
    title:
      - '/^feat(\(.+\))?:/i'
  - label: 'docs'
    title:
      - '/^docs(\(.+\))?:/i'
  - label: 'chore'
    title:
      - '/^chore(\(.+\))?:/i'
  - label: 'refactor'
    title:
      - '/^refactor(\(.+\))?:/i'
  - label: 'test'
    title:
      - '/^test(\(.+\))?:/i'
  - label: 'performance'
    title:
      - '/^perf(\(.+\))?:/i'
  - label: 'breaking'
    title:
      - '/^[a-z]+(\(.+\))?!:/i'
