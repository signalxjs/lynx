packages:
  - packages/*
  - examples/*

onlyBuiltDependencies:
  - esbuild

# @sigx/terminal (and its sub-packages, pulled in transitively via
# @sigx/lynx-cli) still declares its core peers as ">=0.6.0 <0.7.0". This repo
# runs ahead on sigx core 0.7.0; the combination is verified compatible (build,
# typecheck and the full test suite pass against 0.7.0), so allow it explicitly
# rather than emit an unmet-peer warning / fail strict installs. Drop these once
# a 0.7-compatible @sigx/terminal is published.
peerDependencyRules:
  allowedVersions:
    "@sigx/terminal>@sigx/reactivity": ">=0.7.0 <0.8.0"
    "@sigx/terminal>@sigx/runtime-core": ">=0.7.0 <0.8.0"
    "@sigx/terminal-ui>@sigx/reactivity": ">=0.7.0 <0.8.0"
    "@sigx/terminal-ui>@sigx/runtime-core": ">=0.7.0 <0.8.0"
    "@sigx/terminal-zero>@sigx/reactivity": ">=0.7.0 <0.8.0"
    "@sigx/terminal-zero>@sigx/runtime-core": ">=0.7.0 <0.8.0"
    "@sigx/runtime-terminal>@sigx/reactivity": ">=0.7.0 <0.8.0"
    "@sigx/runtime-terminal>@sigx/runtime-core": ">=0.7.0 <0.8.0"
